<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PALATIUM — F02 OCULUS Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0d8c8; font-family: 'Courier New', monospace; overflow: hidden; }
    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    /* ── PANELS ── */
    .panel {
      position: fixed; top: 0; background: rgba(8,8,16,0.92);
      border: 1px solid #3a3050; padding: 12px;
      overflow-y: auto; z-index: 100;
      font-size: 11px; line-height: 1.6;
      backdrop-filter: blur(6px);
    }
    #panel-left  { left: 0; width: 240px; height: 100vh; }
    #panel-right { right: 0; width: 260px; height: 100vh; }

    .panel h2 { color: #c9a84c; font-size: 11px; text-transform: uppercase;
                letter-spacing: 2px; border-bottom: 1px solid #3a3050;
                padding-bottom: 6px; margin-bottom: 10px; }
    .panel h3 { color: #8a7abf; font-size: 10px; text-transform: uppercase;
                letter-spacing: 1px; margin: 10px 0 6px; }
    label { display: block; color: #a09088; margin-bottom: 2px; font-size: 10px; }
    input[type=range] { width: 100%; accent-color: #c9a84c; }
    input[type=number], select {
      width: 100%; background: #13121e; border: 1px solid #3a3050;
      color: #e0d8c8; padding: 3px 6px; border-radius: 3px; font-size: 10px;
    }
    .row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .row label { flex: 1; margin: 0; }
    .row input, .row select { flex: 1.5; }
    .val-display { min-width: 32px; text-align: right; color: #c9a84c; font-size: 10px; }

    /* ── BUTTONS ── */
    .btn {
      display: block; width: 100%; padding: 7px;
      background: #1e1b2e; border: 1px solid #3a3050;
      color: #e0d8c8; cursor: pointer; border-radius: 3px;
      font-family: 'Courier New', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 6px; transition: all 0.15s;
    }
    .btn:hover { background: #2e2a45; border-color: #c9a84c; color: #c9a84c; }
    .btn-primary { background: #2a1e0a; border-color: #c9a84c; color: #c9a84c; }
    .btn-primary:hover { background: #3a2e15; }
    .btn-danger { border-color: #8a2020; color: #c04040; }

    /* ── TAG ITEMS ── */
    .tag-item {
      background: #13121e; border: 1px solid #2a2840;
      border-radius: 3px; padding: 5px 7px; margin-bottom: 4px;
      cursor: pointer; transition: border-color 0.1s;
    }
    .tag-item:hover { border-color: #c9a84c; }
    .tag-item.selected { border-color: #c9a84c; background: #1e1a2a; }
    .tag-name { color: #d0c8e0; font-size: 10px; font-weight: bold; }
    .tag-conf { color: #6a5a8a; font-size: 9px; }
    .tag-toggle { float: right; }

    /* ── WAYPOINT LIST ── */
    .wp-item {
      background: #13121e; border: 1px solid #2a2840;
      border-radius: 3px; padding: 4px 7px; margin-bottom: 3px;
      font-size: 10px; display: flex; justify-content: space-between; align-items: center;
    }
    .wp-item .wp-del { color: #8a2020; cursor: pointer; font-size: 11px; }
    .wp-item .wp-del:hover { color: #ff4040; }

    /* ── STATUS BAR ── */
    #status-bar {
      position: fixed; bottom: 0; left: 240px; right: 260px;
      background: rgba(8,8,16,0.9); border-top: 1px solid #3a3050;
      padding: 5px 12px; font-size: 10px; color: #6a5a8a;
      display: flex; justify-content: space-between; z-index: 100;
    }
    #status-msg { color: #c9a84c; }

    /* ── SPAWN MARKER ── */
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none; opacity: 0.5; z-index: 50;
    }
    #crosshair line { stroke: #c9a84c; stroke-width: 1; }

    .mode-badge {
      position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
      background: #1e1a2a; border: 1px solid #3a3050; padding: 3px 10px;
      font-size: 10px; color: #c9a84c; letter-spacing: 2px; z-index: 101;
      text-transform: uppercase;
    }

    #placement-popup {
      position: fixed; background: rgba(8,8,16,0.96);
      border: 1px solid #c9a84c; border-radius: 4px;
      padding: 10px; z-index: 200; display: none;
      font-family: 'Courier New', monospace;
    }
    #placement-popup .pop-title { color: #c9a84c; margin-bottom: 8px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    #placement-popup .pop-btn { display: block; width: 100%; padding: 6px 10px;
      margin: 3px 0; background: #1e1b2e; border: 1px solid #3a3050;
      color: #e0d8c8; cursor: pointer; border-radius: 3px;
      font-family: inherit; font-size: 10px; text-align: left; }
    #placement-popup .pop-btn:hover { border-color: #c9a84c; color: #c9a84c; }
    #placement-popup .pop-cancel { color: #6a5a8a; border-color: #2a2840; }
    .mode-badge.m2 { border-color: #6a9abf !important; color: #6a9abf !important; }

    /* ── FORMAT OVERLAY ── */
    #format-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 90; }
    #format-overlay .ov-bar { position: absolute; background: rgba(0,0,0,0.55); }

    /* ── Y WARNING ── */
    #y-warning {
      display: none; position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(180,30,30,0.92); border: 1px solid #ff4040;
      color: #fff; padding: 5px 14px; font-size: 11px; letter-spacing: 1px;
      z-index: 200; text-transform: uppercase; white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="canvas-container"><canvas id="c"></canvas></div>

<div class="mode-badge" id="mode-badge">MODE : NAVIGATION</div>

<!-- ── PANNEAU GAUCHE : Caméra + Éclairage ── -->
<div class="panel" id="panel-left">
  <h2>F02 OCULUS — Caméra</h2>

  <h3>Preset</h3>
  <select id="cam-preset">
    <option value="DRONE">DRONE — Extérieur aérien</option>
    <option value="IPHONE_STAB">IPHONE_STAB — Gimbal</option>
    <option value="DOLLY_PAN" selected>DOLLY_PAN — Single Room</option>
    <option value="WALKTHROUGH">WALKTHROUGH — Multi Room</option>
  </select>

  <h3>Spawn</h3>
  <div class="row"><label>X</label><input type="number" id="spawn-x" value="0" step="0.1"><span class="val-display" id="sx-disp">0</span></div>
  <div class="row"><label>Y</label><input type="number" id="spawn-y" value="0" step="0.1"><span class="val-display" id="sy-disp">0</span></div>
  <div class="row"><label>Z</label><input type="number" id="spawn-z" value="0" step="0.1"><span class="val-display" id="sz-disp">0</span></div>
  <button class="btn" id="btn-set-spawn">⊕ Définir Spawn (S)</button>
  <button class="btn" id="btn-goto-spawn">→ Aller au Spawn</button>

  <h3>Waypoints</h3>
  <button class="btn" id="btn-add-wp">+ Ajouter Waypoint (W)</button>
  <div id="wp-list"></div>
  <button class="btn btn-danger" id="btn-clear-wp">✕ Effacer tous les WP</button>

  <h3>Durée vidéo</h3>
  <div class="row"><label>Durée</label>
    <input type="range" id="vid-duration" min="3" max="30" value="10" step="1">
    <span class="val-display" id="dur-disp">10s</span>
  </div>

  <h3>Preview format</h3>
  <div class="row"><label>Format</label>
    <select id="preview-format">
      <option value="shorts">SHORTS (9:16)</option>
      <option value="youtube">YOUTUBE (16:9)</option>
    </select>
  </div>

  <h3>Caméra</h3>
  <div class="row"><label>FOV</label>
    <input type="range" id="cam-fov" min="40" max="110" value="84">
    <span class="val-display" id="fov-disp">84°</span>
  </div>
  <div class="row"><label>Hauteur</label>
    <input type="range" id="cam-height" min="0" max="5" value="1.2" step="0.1">
    <span class="val-display" id="height-disp">1.2m</span>
  </div>

  <h3>Éclairage</h3>
  <div class="row"><label>Ambiance</label>
    <select id="ambient-mode">
      <option value="DAY">DAY</option>
      <option value="GOLDEN_HOUR" selected>GOLDEN_HOUR</option>
      <option value="NIGHT">NIGHT</option>
    </select>
  </div>
  <div class="row"><label>HDRI</label>
    <select id="hdri-select"></select>
  </div>
  <div class="row"><label>Toutes portes ouvertes</label>
    <input type="checkbox" id="doors-all-open">
  </div>
</div>

<!-- ── PANNEAU DROIT : Tags ── -->
<div class="panel" id="panel-right">
  <h2>Tags — Assets</h2>

  <h3>Lampes (<span id="lamp-count">0</span>)</h3>
  <div id="tags-lamps"></div>

  <h3>Vitres (<span id="win-count">0</span>)</h3>
  <div id="tags-windows"></div>

  <h3>Portes (<span id="door-count">0</span>)</h3>
  <div id="tags-doors"></div>

  <h3>Actions</h3>
  <button class="btn" id="btn-highlight">Surligner Sélection</button>
  <button class="btn btn-primary" id="btn-save">SAUVEGARDER (Ctrl+S)</button>
  <div id="save-status" style="margin-top:6px; font-size:10px; color:#6a9a6a;"></div>
</div>

<!-- ── STATUS BAR ── -->
<div id="status-bar">
  <span>PALATIUM F02 OCULUS</span>
  <span id="status-msg">Chargement du GLB...</span>
  <span id="cam-pos-display">Pos: 0.0, 0.0, 0.0</span>
</div>

<!-- ── CROSSHAIR ── -->
<svg id="crosshair" width="24" height="24" viewBox="0 0 24 24">
  <line x1="12" y1="0" x2="12" y2="24"/><line x1="0" y1="12" x2="24" y2="12"/>
</svg>

<div id="format-overlay"></div>
<div id="y-warning">⚠ Caméra hors bâtiment</div>

<div id="placement-popup">
  <div class="pop-title">Placer ici :</div>
  <button class="pop-btn" id="pop-spawn">⊕ Spawn</button>
  <button class="pop-btn" id="pop-waypoint">→ Waypoint W1</button>
  <button class="pop-btn pop-cancel" id="pop-cancel">✕ Annuler</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── SCENE SETUP ──────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(84, 1, 0.01, 2000);
camera.position.set(0, 1.2, 5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = false;
controls.maxPolarAngle = Math.PI * 0.9;

// ── STATE ────────────────────────────────────────────────
const state = {
  spawnPos: { x: 0, y: 0, z: 0 },
  waypoints: [],
  tags: { lamps: [], windows: [], doors: [] },
  config: {},
  model: null,
  hdriList: [],
  selectedTag: null,
  mode: 'navigate',  // 'navigate' | 'spawn' | 'waypoint'
  modelBox: null
};

// Helpers visuels
const wpHelpers = [];
let spawnHelper = null;

function makeSpawnMarker(pos) {
  const geo = new THREE.SphereGeometry(0.08, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0xc9a84c });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, pos.y, pos.z);
  return mesh;
}

function makeWpMarker(pos, index) {
  const geo = new THREE.SphereGeometry(0.06, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0x6a9abf });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, pos.y, pos.z);
  return mesh;
}

// ── LOAD INFO ─────────────────────────────────────────────
async function loadInfo() {
  try {
    const res = await fetch('/info');
    const data = await res.json();
    state.config = data.config;
    state.tags   = data.tags;
    state.hdriList = data.hdri_available || [];
    populateTagPanels();
    populateHdriSelect();
    setStatus('Config chargée. Chargement GLB...');
    await loadGLB();
  } catch(e) {
    setStatus('Erreur chargement /info : ' + e.message);
  }
}

// ── LOAD GLB ─────────────────────────────────────────────
async function loadGLB() {
  const loader = new GLTFLoader();
  loader.load(
    '/glb',
    (gltf) => {
      state.model = gltf.scene;
      scene.add(gltf.scene);

      // Centrer + cadrer
      const box = new THREE.Box3().setFromObject(gltf.scene);
      state.modelBox = box;
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      controls.target.copy(center);
      camera.position.set(center.x + maxDim, center.y + size.y * 0.5, center.z + maxDim);
      controls.update();

      gltf.scene.traverse(node => {
        if (node.isMesh) {
          node.castShadow = true;
          node.receiveShadow = true;
        }
      });
      setStatus('GLB chargé. Viewer prêt.');
    },
    (xhr) => { setStatus(`GLB : ${Math.round(xhr.loaded / xhr.total * 100)}%`); },
    (err) => { setStatus('Erreur GLB : ' + err.message); }
  );
}

// ── HDRI LOADING ──────────────────────────────────────────
function populateHdriSelect() {
  const sel = document.getElementById('hdri-select');
  sel.innerHTML = '';
  state.hdriList.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h; opt.textContent = h;
    sel.appendChild(opt);
  });
  if (state.hdriList.length > 0) loadHdri(state.hdriList[0]);
}

function loadHdri(filename) {
  if (!filename) return;
  new RGBELoader().load('/hdri/' + filename, (tex) => {
    tex.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = tex;
    scene.background  = tex;
    renderer.toneMappingExposure = 0.8;
  });
}

document.getElementById('hdri-select').addEventListener('change', e => {
  loadHdri(e.target.value);
});

// ── TAG PANELS ────────────────────────────────────────────
function populateTagPanels() {
  const { lamps, windows, doors } = state.tags;
  document.getElementById('lamp-count').textContent = lamps.length;
  document.getElementById('win-count').textContent  = windows.length;
  document.getElementById('door-count').textContent = doors.length;

  renderTagList('tags-lamps',   lamps,   'lamps');
  renderTagList('tags-windows', windows, 'windows');
  renderTagList('tags-doors',   doors,   'doors');
}

function renderTagList(containerId, items, category) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'tag-item';
    div.innerHTML = `
      <span class="tag-name">${item.name}</span>
      <span class="tag-conf"> conf:${item.confidence}</span>
      <span class="tag-toggle">
        ${category === 'lamps'
          ? `<input type="checkbox" ${item.enabled !== false ? 'checked' : ''}
               onchange="window.toggleLamp(${i}, this.checked)" title="On/Off">`
          : category === 'doors'
          ? `<input type="checkbox" ${item.open ? 'checked' : ''}
               onchange="window.toggleDoor(${i}, this.checked)" title="Ouverte">`
          : ''}
      </span>`;
    div.addEventListener('click', () => selectTag(category, i, div));
    container.appendChild(div);
  });
}

function selectTag(category, index, el) {
  document.querySelectorAll('.tag-item.selected').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedTag = { category, index };
}

window.toggleLamp = (i, checked) => {
  state.tags.lamps[i].enabled = checked;
};
window.toggleDoor = (i, checked) => {
  state.tags.doors[i].open = checked;
};

// ── SPAWN & WAYPOINTS ─────────────────────────────────────
function setSpawn() {
  const pos = camera.position.clone();
  state.spawnPos = { x: +pos.x.toFixed(3), y: +pos.y.toFixed(3), z: +pos.z.toFixed(3) };
  document.getElementById('spawn-x').value = state.spawnPos.x;
  document.getElementById('spawn-y').value = state.spawnPos.y;
  document.getElementById('spawn-z').value = state.spawnPos.z;

  if (spawnHelper) scene.remove(spawnHelper);
  spawnHelper = makeSpawnMarker(state.spawnPos);
  scene.add(spawnHelper);
  setStatus(`Spawn défini : ${state.spawnPos.x}, ${state.spawnPos.y}, ${state.spawnPos.z}`);
}

function addWaypoint() {
  const pos = camera.position.clone();
  const wp = { x: +pos.x.toFixed(3), y: +pos.y.toFixed(3), z: +pos.z.toFixed(3) };
  state.waypoints.push(wp);
  const marker = makeWpMarker(wp, state.waypoints.length - 1);
  wpHelpers.push(marker);
  scene.add(marker);
  renderWpList();
  setStatus(`WP #${state.waypoints.length} ajouté`);
}

function renderWpList() {
  const list = document.getElementById('wp-list');
  list.innerHTML = '';
  state.waypoints.forEach((wp, i) => {
    const div = document.createElement('div');
    div.className = 'wp-item';
    div.innerHTML = `<span>WP${i+1} (${wp.x}, ${wp.y}, ${wp.z})</span>
      <span class="wp-del" onclick="window.removeWp(${i})">✕</span>`;
    list.appendChild(div);
  });
}

window.removeWp = (i) => {
  state.waypoints.splice(i, 1);
  if (wpHelpers[i]) { scene.remove(wpHelpers[i]); wpHelpers.splice(i, 1); }
  renderWpList();
};

document.getElementById('btn-clear-wp').addEventListener('click', () => {
  state.waypoints = [];
  wpHelpers.forEach(h => scene.remove(h));
  wpHelpers.length = 0;
  renderWpList();
});

document.getElementById('btn-set-spawn').addEventListener('click', setSpawn);
document.getElementById('btn-goto-spawn').addEventListener('click', () => {
  camera.position.set(state.spawnPos.x, state.spawnPos.y, state.spawnPos.z);
});
document.getElementById('btn-add-wp').addEventListener('click', addWaypoint);

// Sync manual inputs → state
['spawn-x','spawn-y','spawn-z'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    state.spawnPos = {
      x: parseFloat(document.getElementById('spawn-x').value) || 0,
      y: parseFloat(document.getElementById('spawn-y').value) || 0,
      z: parseFloat(document.getElementById('spawn-z').value) || 0
    };
  });
});

// ── SLIDERS ───────────────────────────────────────────────
document.getElementById('cam-fov').addEventListener('input', e => {
  camera.fov = parseFloat(e.target.value);
  camera.updateProjectionMatrix();
  document.getElementById('fov-disp').textContent = e.target.value + '°';
});

document.getElementById('cam-height').addEventListener('input', e => {
  document.getElementById('height-disp').textContent = e.target.value + 'm';
});

// ── MODE (1=Navigation / 2=Placement) ────────────────────
let navMode = 1;
const keys  = {};
const raycaster = new THREE.Raycaster();
let pendingHit  = null;

function setNavMode(m) {
  navMode = m;
  const badge = document.getElementById('mode-badge');
  if (m === 1) { badge.textContent = 'MODE : NAVIGATION'; badge.classList.remove('m2'); }
  else         { badge.textContent = 'MODE : PLACEMENT';  badge.classList.add('m2'); }
}

// ── getFloorY : raycast vers le bas — sol intérieur uniquement ──
const ROOF_NAME_PATTERNS = /roof|ceiling|toit|plafond|toiture|cover|top/i;

function isRoofMesh(node) {
  return ROOF_NAME_PATTERNS.test(node.name || '') ||
         (node.parent && ROOF_NAME_PATTERNS.test(node.parent.name || ''));
}

function getFloorY(x, z) {
  if (!state.model || !state.modelBox) return 0;

  // Démarrer le ray depuis le haut du bâtiment + marge
  const rayOriginY = state.modelBox.max.y + 1;
  const ray = new THREE.Raycaster(
    new THREE.Vector3(x, rayOriginY, z), new THREE.Vector3(0, -1, 0)
  );

  // Collecter les meshes en excluant les toits par nom
  const meshes = [];
  state.model.traverse(n => {
    if (n.isMesh && !isRoofMesh(n)) meshes.push(n);
  });

  const hits = ray.intersectObjects(meshes, false);

  // Garder uniquement les surfaces quasi-horizontales (normales Y > 0.7)
  const horizontal = hits.filter(h => h.face && Math.abs(h.face.normal.y) > 0.7);

  if (horizontal.length) {
    // Préférer les surfaces situées dans le tiers inférieur du bâtiment
    const boxH   = state.modelBox.max.y - state.modelBox.min.y;
    const floorZ = state.modelBox.min.y + boxH * 0.45; // seuil à 45 % de la hauteur
    const inner  = horizontal.filter(h => h.point.y <= floorZ);
    if (inner.length)
      return inner.reduce((a, b) => a.point.y < b.point.y ? a : b).point.y;
    // Fallback : la surface la plus basse parmi toutes les horizontales
    return horizontal.reduce((a, b) => a.point.y < b.point.y ? a : b).point.y;
  }

  // Aucune surface horizontale : retourner le bas du bâtiment
  return state.modelBox.min.y;
}

// ── Double-clic → popup placement ────────────────────────────
const canvas = document.getElementById('c');
canvas.addEventListener('dblclick', e => {
  if (navMode !== 2) return;
  const rect  = canvas.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width)  * 2 - 1,
   -((e.clientY - rect.top)  / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  if (state.model) state.model.traverse(n => { if (n.isMesh) meshes.push(n); });
  const hits = raycaster.intersectObjects(meshes, false);
  if (!hits.length) { setStatus('Vise une surface du modèle'); return; }
  pendingHit = hits[0].point.clone();
  const popup = document.getElementById('placement-popup');
  document.getElementById('pop-waypoint').textContent =
    '→ Waypoint W' + (state.waypoints.length + 1);
  popup.style.left    = Math.min(e.clientX + 8, window.innerWidth  - 150) + 'px';
  popup.style.top     = Math.min(e.clientY + 8, window.innerHeight - 110) + 'px';
  popup.style.display = 'block';
});

function hidePopup() {
  document.getElementById('placement-popup').style.display = 'none';
  pendingHit = null;
}
document.getElementById('pop-cancel').addEventListener('click', hidePopup);

document.getElementById('pop-spawn').addEventListener('click', () => {
  if (!pendingHit) return;
  const h      = parseFloat(document.getElementById('cam-height').value) || 1.2;
  const floorY = getFloorY(pendingHit.x, pendingHit.z);
  const pos    = { x: +pendingHit.x.toFixed(3), y: +(floorY + h).toFixed(3), z: +pendingHit.z.toFixed(3) };
  state.spawnPos = pos;
  ['x','y','z'].forEach(a => document.getElementById('spawn-'+a).value = pos[a]);
  camera.position.set(pos.x, pos.y, pos.z);
  controls.target.set(pos.x, pos.y, pos.z - 1);
  controls.update();
  if (spawnHelper) scene.remove(spawnHelper);
  spawnHelper = makeSpawnMarker(pos);
  scene.add(spawnHelper);
  setStatus('Spawn défini + téléporté → ' + pos.x + ', ' + pos.y + ', ' + pos.z);
  hidePopup();
});

document.getElementById('pop-waypoint').addEventListener('click', () => {
  if (!pendingHit) return;
  const h      = parseFloat(document.getElementById('cam-height').value) || 1.2;
  const floorY = getFloorY(pendingHit.x, pendingHit.z);
  const wp     = { x: +pendingHit.x.toFixed(3), y: +(floorY + h).toFixed(3), z: +pendingHit.z.toFixed(3) };
  state.waypoints.push(wp);
  const marker = makeWpMarker(wp, state.waypoints.length - 1);
  wpHelpers.push(marker); scene.add(marker);
  renderWpList();
  setStatus('WP #' + state.waypoints.length + ' ajouté');
  hidePopup();
});

// ── PREVIEW MODE ──────────────────────────────────────────────
let previewActive = false;
let previewTimer  = null;

function startPreview() {
  const path = [];
  if (state.spawnPos) path.push({...state.spawnPos});
  state.waypoints.forEach(wp => path.push({...wp}));
  if (path.length < 2) { setStatus('Spawn + au moins 1 WP requis pour la preview'); return; }
  path.push({...path[0]});
  previewActive    = true;
  controls.enabled = false;
  setStatus('▶ PREVIEW — P ou Échap pour arrêter');
  camera.position.set(path[0].x, path[0].y, path[0].z);
  camera.lookAt(path[1].x, path[1].y, path[1].z);
  animateSeg(path, 0);
}

function stopPreview() {
  previewActive    = false;
  controls.enabled = true;
  if (previewTimer) { clearTimeout(previewTimer); previewTimer = null; }
  controls.target.set(camera.position.x, camera.position.y, camera.position.z - 1);
  controls.update();
  setStatus('■ Preview arrêtée');
}

function animateSeg(path, i) {
  if (!previewActive || i + 1 >= path.length) { stopPreview(); return; }
  const from = path[i], to = path[i + 1];
  const totalDuration = (parseFloat(document.getElementById('vid-duration').value) || 10) * 1000;
  const totalSegs = path.length - 1;
  const dur = totalDuration / totalSegs;
  const t0  = performance.now();
  const yWarn = document.getElementById('y-warning');
  function step(now) {
    if (!previewActive) return;
    const t = Math.min((now - t0) / dur, 1);
    const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
    camera.position.set(
      from.x + (to.x - from.x) * e,
      from.y + (to.y - from.y) * e,
      from.z + (to.z - from.z) * e
    );
    camera.lookAt(to.x, to.y, to.z);
    // Validation Y
    if (state.modelBox && camera.position.y > state.modelBox.max.y * 0.85)
      yWarn.style.display = 'block';
    else
      yWarn.style.display = 'none';
    if (t < 1) requestAnimationFrame(step);
    else {
      yWarn.style.display = 'none';
      animateSeg(path, i + 1);
    }
  }
  requestAnimationFrame(step);
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === 'Escape') { stopPreview(); hidePopup(); return; }
  if (e.key === 'p' || e.key === 'P') { if (previewActive) stopPreview(); else startPreview(); return; }
  if (e.key === '1') { setNavMode(1); return; }
  if (e.key === '2') { setNavMode(2); return; }
  if (navMode === 1) {
    if (e.key === 's' || e.key === 'S') setSpawn();
    if (e.key === 'w' || e.key === 'W') addWaypoint();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveConfigs(); }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ── SAVE ─────────────────────────────────────────────────
async function saveConfigs() {
  const preset = document.getElementById('cam-preset').value;
  const fov    = parseFloat(document.getElementById('cam-fov').value);
  const height = parseFloat(document.getElementById('cam-height').value);
  const ambientMode = document.getElementById('ambient-mode').value;
  const doorsAllOpen = document.getElementById('doors-all-open').checked;
  const hdri = document.getElementById('hdri-select').value;
  const duration = parseFloat(document.getElementById('vid-duration').value) || 10;

  const creativeConfig = {
    camera: {
      mode: preset,
      fov,
      height,
      spawn_pos: state.spawnPos,
      waypoints: state.waypoints
    },
    duration,
    lighting: {
      ambient_mode: ambientMode,
      hdri_file: hdri,
      lamps_override: state.tags.lamps.map(l => ({
        name: l.name, enabled: l.enabled !== false, intensity: l.intensity || 1.0
      })),
      doors_all_open: doorsAllOpen,
      doors_override: state.tags.doors.map(d => ({
        name: d.name, open: d.open || false
      }))
    }
  };

  const tagsConfig = {
    lamps:   state.tags.lamps,
    windows: state.tags.windows,
    doors:   state.tags.doors
  };

  try {
    const res = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ creative_config: creativeConfig, tags_config: tagsConfig })
    });
    const data = await res.json();
    const el = document.getElementById('save-status');
    if (data.status === 'ok') {
      el.textContent = '✅ Sauvegardé : ' + data.saved.join(', ');
      el.style.color = '#6a9a6a';
      setStatus('Configs sauvegardées → prêt pour F03');
    } else {
      el.textContent = '❌ Erreur : ' + JSON.stringify(data.errors);
      el.style.color = '#c04040';
    }
  } catch(e) {
    document.getElementById('save-status').textContent = '❌ ' + e.message;
  }
}

document.getElementById('vid-duration').addEventListener('input', e => {
  document.getElementById('dur-disp').textContent = e.target.value + 's';
});

function updateFormatOverlay() {
  const fmt = document.getElementById('preview-format').value;
  const overlay = document.getElementById('format-overlay');
  overlay.innerHTML = '';
  if (fmt === 'shorts') {
    const w = window.innerWidth, h = window.innerHeight;
    const targetW = Math.round(h * 9 / 16);
    if (targetW < w) {
      const bw = Math.round((w - targetW) / 2);
      overlay.innerHTML =
        '<div class="ov-bar" style="left:0;top:0;width:' + bw + 'px;height:100%"></div>' +
        '<div class="ov-bar" style="right:0;top:0;width:' + bw + 'px;height:100%"></div>';
    }
  }
}
document.getElementById('preview-format').addEventListener('change', updateFormatOverlay);
window.addEventListener('resize', updateFormatOverlay);
updateFormatOverlay();

document.getElementById('btn-save').addEventListener('click', saveConfigs);

// ── RESIZE ────────────────────────────────────────────────
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── ANIMATE ───────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Deplacement clavier : fleches + E/Q
  if (!previewActive) {
    const spd   = 0.06;
    const fwd   = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
    const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0,1,0)).normalize();
    const mv    = new THREE.Vector3();
    if (keys['ArrowUp'])    mv.addScaledVector(fwd,    spd);
    if (keys['ArrowDown'])  mv.addScaledVector(fwd,   -spd);
    if (keys['ArrowRight']) mv.addScaledVector(right,  spd);
    if (keys['ArrowLeft'])  mv.addScaledVector(right, -spd);
    if (keys['e'] || keys['E']) mv.y += spd;
    if (keys['q'] || keys['Q']) mv.y -= spd;
    if (mv.lengthSq() > 0) { camera.position.add(mv); controls.target.add(mv); }
  }

  const p = camera.position;
  document.getElementById('cam-pos-display').textContent =
    `Pos: ${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}`;

  renderer.render(scene, camera);
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ── INIT ──────────────────────────────────────────────────
loadInfo();
animate();
</script>
